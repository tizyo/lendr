name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  # ─── PHP Tests ─────────────────────────────────────────
  test-php:
    name: PHP Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']

    services:
      mysql:
        image: mysql:8.2
        env:
          MYSQL_ROOT_PASSWORD: root_secret
          MYSQL_DATABASE: lendr_test
          MYSQL_USER: lendr
          MYSQL_PASSWORD: lendr_secret
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, bcmath, pdo_mysql, redis, gd, zip, xml
          coverage: xdebug

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-scripts --optimize-autoloader

      - name: Copy environment file
        run: cp .env.example .env

      - name: Configure test environment
        run: |
          sed -i 's/DB_PORT=3307/DB_PORT=3306/' .env
          sed -i 's/DB_PASSWORD=lendr_secret/DB_PASSWORD=lendr_secret/' .env
          sed -i 's/REDIS_PORT=6380/REDIS_PORT=6379/' .env
          sed -i 's/REDIS_PASSWORD=redis_secret/REDIS_PASSWORD=/' .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run Pint (code style)
        run: vendor/bin/pint --test

      - name: Run PHPStan (static analysis)
        run: vendor/bin/phpstan analyse --no-progress

      - name: Run Pest tests
        run: vendor/bin/pest --coverage --min=80
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: lendr_test
          DB_USERNAME: lendr
          DB_PASSWORD: lendr_secret
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""

  # ─── Frontend Tests ────────────────────────────────────
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test:unit -- --coverage

      - name: Build assets
        run: npm run build

  # ─── Security Scan ────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PHP Security Checker
        uses: symfonycorp/security-checker-action@v5

      - name: npm Audit
        run: npm audit --audit-level=high
