##############################################################################
# LENDR — Docker Compose (containerized-deploy reference / local parity)
#
# NOT the current production deploy path. Production deploys via SSH +
# git pull directly on the host — see .github/workflows/cd-production.yml.
# This file is a reference topology for a future move to containers, and
# doubles as a local prod-parity harness (`docker compose -f
# docker-compose.prod.yml up -d`) for testing config/scaling changes before
# they land in the real (host-based) deploy.
#
# Required environment variables (pass via .env or secrets manager):
#   APP_KEY, DB_PASSWORD, REDIS_PASSWORD, AWS_* , SENTRY_LARAVEL_DSN, etc.
#
# NOTE: Source code is baked into the image — no volume mounts for src/.
##############################################################################

services:

  # ─── PHP-FPM app ───────────────────────────────────────────────────────────
  app:
    image: ${APP_IMAGE:-lendr/app}:${APP_VERSION:-latest}
    restart: unless-stopped
    environment:
      APP_ENV:              production
      APP_DEBUG:            "false"
      APP_KEY:              ${APP_KEY}
      APP_URL:              ${APP_URL}
      LOG_CHANNEL:          stderr
      LOG_LEVEL:            warning

      DB_CONNECTION:        mysql
      DB_HOST:              db
      DB_PORT:              3306
      DB_DATABASE:          ${DB_DATABASE:-lendr}
      DB_USERNAME:          ${DB_USERNAME:-lendr}
      DB_PASSWORD:          ${DB_PASSWORD}

      REDIS_HOST:           redis
      REDIS_PORT:           6379
      REDIS_PASSWORD:       ${REDIS_PASSWORD}
      CACHE_STORE:          redis
      SESSION_DRIVER:       redis
      QUEUE_CONNECTION:     redis
      BROADCAST_CONNECTION: reverb

      TENANCY_CENTRAL_CONNECTION: mysql

      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION:    ${AWS_DEFAULT_REGION:-af-south-1}
      AWS_BUCKET:            ${AWS_BUCKET}

      SENTRY_LARAVEL_DSN:   ${SENTRY_LARAVEL_DSN}
      BCRYPT_ROUNDS:        12
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "artisan", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - internal
    # No src/ volume — code is baked into the image

  # ─── Laravel queue worker ──────────────────────────────────────────────────
  worker:
    image: ${APP_IMAGE:-lendr/app}:${APP_VERSION:-latest}
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    environment:
      APP_ENV:          production
      APP_DEBUG:        "false"
      APP_KEY:          ${APP_KEY}
      DB_HOST:          db
      DB_DATABASE:      ${DB_DATABASE:-lendr}
      DB_USERNAME:      ${DB_USERNAME:-lendr}
      DB_PASSWORD:      ${DB_PASSWORD}
      REDIS_HOST:       redis
      REDIS_PASSWORD:   ${REDIS_PASSWORD}
      QUEUE_CONNECTION: redis
      LOG_CHANNEL:      stderr
      LOG_LEVEL:        warning
      SENTRY_LARAVEL_DSN: ${SENTRY_LARAVEL_DSN}
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - app
    networks:
      - internal

  # ─── Laravel scheduler ────────────────────────────────────────────────────
  scheduler:
    image: ${APP_IMAGE:-lendr/app}:${APP_VERSION:-latest}
    restart: unless-stopped
    command: >
      sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    environment:
      APP_ENV:        production
      APP_DEBUG:      "false"
      APP_KEY:        ${APP_KEY}
      DB_HOST:        db
      DB_DATABASE:    ${DB_DATABASE:-lendr}
      DB_USERNAME:    ${DB_USERNAME:-lendr}
      DB_PASSWORD:    ${DB_PASSWORD}
      REDIS_HOST:     redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      LOG_CHANNEL:    stderr
      LOG_LEVEL:      warning
      SENTRY_LARAVEL_DSN: ${SENTRY_LARAVEL_DSN}
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'while true' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - app
    networks:
      - internal

  # ─── Laravel Reverb (WebSocket server for real-time broadcasting) ─────────
  reverb:
    image: ${APP_IMAGE:-lendr/app}:${APP_VERSION:-latest}
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    environment:
      APP_ENV:              production
      APP_DEBUG:            "false"
      APP_KEY:              ${APP_KEY}
      APP_URL:              ${APP_URL}
      DB_HOST:              db
      DB_DATABASE:          ${DB_DATABASE:-lendr}
      DB_USERNAME:          ${DB_USERNAME:-lendr}
      DB_PASSWORD:          ${DB_PASSWORD}
      REDIS_HOST:           redis
      REDIS_PASSWORD:       ${REDIS_PASSWORD}
      BROADCAST_CONNECTION: reverb
      LOG_CHANNEL:          stderr
      LOG_LEVEL:            warning
      SENTRY_LARAVEL_DSN:   ${SENTRY_LARAVEL_DSN}
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'reverb:start' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - app
    networks:
      - internal

  # ─── Nginx (SSL termination + static assets) ───────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro        # mount TLS certs (or use certbot volume)
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - app
    networks:
      - internal
      - external

  # ─── MySQL ─────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE:      ${DB_DATABASE:-lendr}
      MYSQL_USER:          ${DB_USERNAME:-lendr}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/prod.cnf:/etc/mysql/conf.d/prod.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── Redis (AOF persistence) ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

volumes:
  db_data:
  redis_data:
  nginx_logs:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
